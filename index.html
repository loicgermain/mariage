<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Mariage 💍">
  <meta name="theme-color" content="#7F77DD">
  <title>Mariage Loïc & Caro</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --purple: #7F77DD;
      --purple-dark: #534AB7;
      --purple-light: #EEEDFE;
      --purple-text: #3C3489;
      --green: #0F6E56;
      --green-light: #E1F5EE;
      --green-text: #085041;
      --amber: #854F0B;
      --amber-light: #FAEEDA;
      --amber-text: #633806;
      --red: #993C1D;
      --red-light: #FCEBEB;
      --red-text: #791F1F;
      --bg: #F5F5F7;
      --card: #FFFFFF;
      --surface: #F0F0F5;
      --border: rgba(0,0,0,0.08);
      --border-med: rgba(0,0,0,0.14);
      --text: #1A1A1A;
      --text-sec: #666;
      --text-hint: #999;
      --radius: 12px;
      --radius-sm: 8px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0F0F12;
        --card: #1C1C22;
        --surface: #26262E;
        --border: rgba(255,255,255,0.08);
        --border-med: rgba(255,255,255,0.14);
        --text: #F0F0F0;
        --text-sec: #A0A0B0;
        --text-hint: #666;
      }
    }
    html, body { height: 100%; background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: var(--text); font-size: 16px; }
    .app { max-width: 430px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; background: var(--bg); }

    /* Topbar */
    .topbar { background: var(--card); border-bottom: 0.5px solid var(--border); padding: 14px 16px 10px; padding-top: max(14px, env(safe-area-inset-top)); position: sticky; top: 0; z-index: 50; }
    .topbar-row { display: flex; justify-content: space-between; align-items: center; }
    .topbar-title { font-size: 17px; font-weight: 600; color: var(--text); }
    .topbar-sub { font-size: 12px; color: var(--text-sec); margin-top: 2px; }
    .sync-badge { font-size: 11px; padding: 4px 9px; border-radius: 999px; border: none; cursor: pointer; font-weight: 500; }
    .sync-ok   { background: var(--green-light); color: var(--green-text); }
    .sync-spin { background: var(--surface); color: var(--text-sec); }
    .sync-err  { background: var(--red-light); color: var(--red-text); }

    /* Content & Nav */
    .content { flex: 1; padding: 12px 12px 90px; overflow-y: auto; }
    .nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: var(--card); border-top: 0.5px solid var(--border); display: flex; z-index: 50; padding-bottom: env(safe-area-inset-bottom); }
    .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 9px 4px 10px; border: none; background: none; cursor: pointer; color: var(--text-sec); font-size: 10px; gap: 3px; transition: color 0.15s; }
    .nav-btn .icon { font-size: 22px; }
    .nav-btn.active { color: var(--purple); }

    /* Cards & Layout */
    .card { background: var(--card); border-radius: var(--radius); border: 0.5px solid var(--border); padding: 14px 16px; margin-bottom: 10px; }
    .card-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: var(--text); }
    .mg { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 8px; margin-bottom: 10px; }
    .mc { background: var(--surface); border-radius: var(--radius-sm); padding: 11px 13px; }
    .mc-click { cursor: pointer; transition: outline 0.1s; }
    .mc-click:active { opacity: 0.6; }
    .mc-active { outline: 2px solid var(--purple); outline-offset: -1px; }
    .ml { font-size: 11px; color: var(--text-sec); margin-bottom: 3px; }
    .mv { font-size: 20px; font-weight: 600; color: var(--text); }
    .mv.purple { color: var(--purple-dark); }
    .mv.green  { color: var(--green); }
    .mv.red    { color: var(--red); }
    .mv.amber  { color: var(--amber); }

    /* Hero */
    .hero { background: var(--purple-dark); border-radius: var(--radius); padding: 18px 16px; margin-bottom: 10px; color: #fff; }
    .hero-lbl { font-size: 12px; opacity: .8; margin-bottom: 4px; }
    .hero-val { font-size: 34px; font-weight: 700; letter-spacing: -0.5px; }
    .hero-sub { font-size: 12px; opacity: .75; margin-top: 6px; }

    /* Section title */
    .stitle { font-size: 12px; font-weight: 600; color: var(--text-sec); text-transform: uppercase; letter-spacing: .05em; margin: 14px 0 8px; }

    /* Budget bars */
    .brow { display: flex; align-items: center; gap: 8px; margin-bottom: 9px; }
    .bcat { font-size: 13px; color: var(--text); width: 108px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bwrap { flex: 1; height: 6px; background: var(--surface); border-radius: 3px; overflow: hidden; }
    .bbar { height: 100%; border-radius: 3px; }
    .bar-ok   { background: #1D9E75; }
    .bar-warn { background: #EF9F27; }
    .bar-over { background: #E24B4A; }
    .bamt { font-size: 11px; color: var(--text-sec); width: 70px; text-align: right; flex-shrink: 0; }

    /* Alerts */
    .alert { background: var(--amber-light); border-radius: var(--radius-sm); padding: 10px 12px; margin-bottom: 8px; display: flex; gap: 8px; }
    .alert-icon { font-size: 16px; flex-shrink: 0; }
    .alert-txt { font-size: 12px; color: var(--amber-text); line-height: 1.5; }

    /* Badges */
    .badge { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 999px; font-weight: 500; }
    .b-ok     { background: var(--green-light);  color: var(--green-text); }
    .b-warn   { background: var(--amber-light);  color: var(--amber-text); }
    .b-red    { background: var(--red-light);    color: var(--red-text); }
    .b-gray   { background: var(--surface);      color: var(--text-sec); }
    .b-purple { background: var(--purple-light); color: var(--purple-text); }

    /* Dépenses */
    .ditem { display: flex; justify-content: space-between; align-items: flex-start; padding: 10px 0; border-bottom: 0.5px solid var(--border); cursor: pointer; }
    .ditem:active { opacity: 0.6; }
    .ditem:last-child { border-bottom: none; }
    .dname { font-size: 14px; color: var(--text); margin-bottom: 2px; }
    .dmeta { font-size: 11px; color: var(--text-sec); margin-bottom: 3px; }
    .damt  { font-size: 14px; font-weight: 600; color: var(--text); text-align: right; }
    .dreste{ font-size: 11px; color: var(--red); text-align: right; }

    /* Revenus */
    .ritem  { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 0.5px solid var(--border); cursor: pointer; }
    .ritem:active { opacity: 0.6; }
    .ritem:last-child { border-bottom: none; }
    .rname  { font-size: 14px; color: var(--text); margin-bottom: 2px; }
    .rmeta  { font-size: 11px; color: var(--text-sec); margin-bottom: 3px; }
    .rright { text-align: right; flex-shrink: 0; }
    .ramt   { font-size: 14px; font-weight: 600; color: var(--text); }
    .rdate  { font-size: 11px; color: var(--text-sec); }

    /* Filters */
    .frow-chips { display: flex; gap: 6px; margin-bottom: 10px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
    .frow-chips::-webkit-scrollbar { display: none; }
    .chip { font-size: 12px; padding: 5px 12px; border-radius: 999px; border: 0.5px solid var(--border-med); background: none; color: var(--text-sec); cursor: pointer; white-space: nowrap; flex-shrink: 0; }
    .chip.active { background: var(--purple-light); color: var(--purple-text); border-color: var(--purple); }

    /* Search */
    .search-wrap { position: relative; margin-bottom: 10px; }
    .si { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 14px; }
    .search-wrap input { width: 100%; padding: 9px 10px 9px 32px; border-radius: var(--radius-sm); border: 0.5px solid var(--border-med); background: var(--card); color: var(--text); font-size: 14px; }

    /* Foyer cards */
    .fcard { background: var(--card); border-radius: var(--radius); border: 0.5px solid var(--border); margin-bottom: 8px; overflow: hidden; }
    .fhdr  { display: flex; align-items: center; gap: 10px; padding: 11px 13px; cursor: pointer; }
    .avatar{ width: 38px; height: 38px; border-radius: 50%; background: var(--purple-light); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: var(--purple-text); flex-shrink: 0; }
    .finfo { flex: 1; min-width: 0; }
    .fname { font-size: 14px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .fmeta { font-size: 11px; color: var(--text-sec); margin-top: 2px; }
    .conf-count { color: var(--green); }
    .fright{ display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }

    /* Expand form */
    .expand { padding: 0 13px 14px; border-top: 0.5px solid var(--border); }
    .slbl   { font-size: 11px; font-weight: 600; color: var(--text-sec); text-transform: uppercase; letter-spacing: .04em; margin: 12px 0 8px; }
    .fgrid  { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 8px; }
    .fi     { display: flex; flex-direction: column; gap: 3px; }
    .fi.full{ grid-column: 1/-1; }
    .fi label { font-size: 11px; color: var(--text-sec); }
    .fi input, .fi select, .fi textarea { width: 100%; font-size: 13px; padding: 8px 9px; border-radius: var(--radius-sm); border: 0.5px solid var(--border-med); background: var(--card); color: var(--text); }
    .fi textarea { resize: none; height: 52px; }
    .conf-box   { background: var(--surface); border-radius: var(--radius-sm); padding: 10px 12px; margin-top: 8px; }
    .conf-title { font-size: 12px; color: var(--text-sec); margin-bottom: 8px; }

    /* Membres d'un foyer */
    .mbr { display: flex; align-items: center; gap: 8px; padding: 5px 0; }
    .mbr-nom { flex: 1; min-width: 0; font-size: 13px; padding: 8px 9px; border-radius: var(--radius-sm); border: 0.5px solid var(--border-med); background: var(--card); color: var(--text); }
    .seg { display: flex; border: 0.5px solid var(--border-med); border-radius: var(--radius-sm); overflow: hidden; flex-shrink: 0; }
    .seg-b { width: 34px; padding: 8px 0; border: none; border-left: 0.5px solid var(--border-med); background: var(--card); color: var(--text-sec); font-size: 13px; cursor: pointer; }
    .seg-b:first-child { border-left: none; }
    .seg-b.sb-a.on { background: var(--surface); color: var(--text); }
    .seg-b.sb-c.on { background: var(--green); color: #fff; }
    .seg-b.sb-d.on { background: #E24B4A; color: #fff; }
    .mbr-del { background: none; border: none; cursor: pointer; font-size: 14px; opacity: .55; flex-shrink: 0; padding: 2px; }
    .mbr-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
    .mbr-actions .btn-sec { flex: 1; padding: 8px 6px; font-size: 12px; min-width: 72px; }

    /* Buttons */
    .btn-primary { width: 100%; background: var(--purple); color: #fff; border: none; border-radius: var(--radius-sm); padding: 12px; font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 10px; }
    .btn-row  { display: flex; gap: 7px; margin-top: 10px; }
    .btn-save { flex: 1; background: var(--purple); color: #fff; border: none; border-radius: var(--radius-sm); padding: 10px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn-sec  { background: none; border: 0.5px solid var(--border-med); color: var(--text); border-radius: var(--radius-sm); padding: 10px 14px; font-size: 14px; cursor: pointer; }
    .btn-del  { background: none; border: 0.5px solid #E24B4A; color: #A32D2D; border-radius: var(--radius-sm); padding: 10px 13px; font-size: 13px; cursor: pointer; }

    /* Modal */
    .mbg   { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; display: flex; align-items: flex-end; justify-content: center; }
    .modal { background: var(--card); border-radius: var(--radius) var(--radius) 0 0; padding: 20px 16px 32px; width: 100%; max-width: 430px; max-height: 88vh; overflow-y: auto; }
    .mtitle{ font-size: 16px; font-weight: 600; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; color: var(--text); }
    .mclose{ background: none; border: none; cursor: pointer; font-size: 18px; color: var(--text-sec); }
    .mf    { margin-bottom: 12px; }
    .mf label { font-size: 12px; color: var(--text-sec); display: block; margin-bottom: 4px; }
    .mf input, .mf select, .mf textarea { width: 100%; font-size: 14px; padding: 9px 11px; border-radius: var(--radius-sm); border: 0.5px solid var(--border-med); background: var(--card); color: var(--text); }
    .mf textarea { resize: none; height: 64px; }
    .mcheck{ display: flex; gap: 20px; margin-bottom: 14px; font-size: 13px; color: var(--text); }
    .mcheck label { display: flex; align-items: center; gap: 6px; cursor: pointer; }

    /* Loading */
    .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px; gap: 14px; color: var(--text-sec); }
    .spinner { width: 28px; height: 28px; border: 2.5px solid var(--border-med); border-top-color: var(--purple); border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty { text-align: center; padding: 28px; color: var(--text-sec); font-size: 14px; }

    /* Login */
    .login-wrap { display: flex; align-items: center; justify-content: center; min-height: 70vh; padding: 12px; }
    .login-card { width: 100%; max-width: 340px; padding: 24px 20px; }
    .login-title { font-size: 22px; font-weight: 700; text-align: center; color: var(--text); }
    .login-sub { font-size: 13px; color: var(--text-sec); text-align: center; margin: 4px 0 20px; }
    .login-err { font-size: 12px; color: var(--red-text); background: var(--red-light); padding: 8px 10px; border-radius: var(--radius-sm); margin-bottom: 12px; text-align: center; }

    /* État non connecté : on masque navigation et boutons sauf déconnexion */
    body.locked .nav { display: none; }
    body.locked #privacy-btn, body.locked #sync-badge, body.locked #logout-btn { display: none; }
    body:not(.locked) #logout-btn { display: inline-block; }

    /* ── Tablettes & grands écrans (iPad, Samsung Tab...) ── */
    @media (min-width: 768px) {
      .app { max-width: 860px; }
      .nav { max-width: 860px; }
      .content { padding: 16px 18px 100px; }
      .topbar { padding-left: 18px; padding-right: 18px; }
      /* Cartes de métriques : autant de colonnes que la largeur le permet */
      .mg { grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); }
      /* Formulaires d'invités plus denses */
      .fgrid { grid-template-columns: repeat(3, minmax(0,1fr)); }
      .hero-val { font-size: 42px; }
      .nav-btn { padding: 12px 4px 13px; font-size: 11px; }
      .nav-btn .icon { font-size: 24px; }
      /* Modales centrées (au lieu d'une feuille en bas d'écran) */
      .mbg { align-items: center; }
      .modal { max-width: 560px; border-radius: var(--radius); }
    }
  </style>
</head>
<body class="locked">
<div class="app">
  <div class="topbar">
    <div class="topbar-row">
      <div class="topbar-title">💍 Loïc & Caro</div>
      <div class="topbar-actions" id="topbar-actions" style="display:flex;gap:6px;align-items:center;">
        <button id="privacy-btn" class="sync-badge sync-ok" onclick="togglePrivacy()" title="Mode discret">👁</button>
        <button class="sync-badge sync-spin" id="sync-badge">↻ Chargement...</button>
        <button class="sync-badge sync-err" id="logout-btn" onclick="doLogout()" title="Se déconnecter">⎋</button>
      </div>
    </div>
    <div class="topbar-sub" id="topbar-sub">Budget mariage</div>
  </div>

  <div class="content" id="content">
    <div class="loading"><div class="spinner"></div>Chargement des données...</div>
  </div>

  <nav class="nav">
    <button class="nav-btn active" id="nav-dashboard" onclick="show('dashboard')">
      <span class="icon">🏠</span>Dashboard
    </button>
    <button class="nav-btn" id="nav-depenses" onclick="show('depenses')">
      <span class="icon">💳</span>Dépenses
    </button>
    <button class="nav-btn" id="nav-revenus" onclick="show('revenus')">
      <span class="icon">💰</span>Revenus
    </button>
    <button class="nav-btn" id="nav-invites" onclick="show('invites')">
      <span class="icon">👥</span>Invités
    </button>
  </nav>
</div>

<div id="modal-root"></div>
<script type="module" src="app.js"></script>
</body>
</html>
